<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var num = 9;
        if (num%2==0)
        {
            document.write("Number is even")
        }
        else{
            document.write("number is odd<br>")
        }
    //To print the numbers from 0 to 10
        var i;
        for (i=0;i<=10;i++){
            document.write(i+"<br>")
        }
    //Multiplication table
    var num=5;
    var j;
    for (j=1;j<=10;j++){
        document.write(num+"x"+j+"="+(num*j)+"<br>")
    }

    var marks=75;
    if(marks>=40){
        document.write("Result:pass")
    }
    else{
        document.write("Result:Fail")
    }
    var day=3;
    switch(day){
        case 1:
        document.write("Monday");
        break;
        case 2:
        document.write("Tuesday");
        break;
        case 3:
        document.write("wednesday");
        break;
        case 4:
        document.write("Thursday");
        break;
        default:
        document.write("Invalild Day");
    }
    </script>
</body>
</html>
