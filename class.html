<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bank Account (No Input, No Button)</title>
</head>
<body>
    <h3 id="balanceDisplay"></h3>
<script>
        class BankAccount {
            constructor() {
                this.balance = 900;
            }
        deposit(amount) {
                this.balance += amount;
            }
            withdraw(amount) {
                amount>this.balance 
                     alert("Insufficient balance")
                     this.balance -= amount;
            }
            displayBalance() {
                return this.balance;
            }
        }
        let account = new BankAccount();
        account.deposit(1000);   
        account.withdraw(300); 
        document.getElementById("balanceDisplay").innerText="Balance:"+account.displayBalance();
    </script>
</body>
</html>
