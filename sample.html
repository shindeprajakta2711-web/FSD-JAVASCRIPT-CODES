<html>
 <head>
   <title>promise application</title>
   <script type='text/javascript'>
    
	function startClock()
	{  setInterval(function(){
	   let d=new Date();
		let time=d.toLocaleTimeString();
	document.getElementById("h").innerHTML=""+time;
	},1000);
	}
	 
   </script>
 </head>
 <body>
    <input type="button" name="s" value="Start Digital Clock" 
	style='width:400px;height:40px'
	 onclick="startClock()"/>
	<br/><br/>
	<h1 id="h"></h1>
 </body>
</html>
