<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promise application</title>
<script>
    let p = new Promise(function(resolve,reject){
        let s1 = "Good";
        let s2 = "Goods";
        if(s1==s2){
            resolve("Strings are equal");
        }
        else{
            reject("strings are not equal");
        }
    });
    p.then(function(str){
        document.write(str);
    }).catch(function(str){
        document.write(str);
    });
</script>
</head>

<body>
    
</body>
</html>
