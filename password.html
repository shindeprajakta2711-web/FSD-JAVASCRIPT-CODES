<html>
  <head>
   <title>password validation</title>
<script type='text/javascript'>
  let sccount=0,dcount=0,ucount=0,lcount=0;
  function validatePassword(str)
   { 
     if(str.length<=8)
     { document.getElementById("s").innerHTML="Invalid password";
     }
    else{
     
      for(var i=0;i<str.length;i++)
      {  
           if((str.charCodeAt(i)>=65 && str.charCodeAt(i)<=90))
           { ++ucount;
           }
           if((str.charCodeAt(i)>=97 && str.charCodeAt(i)<=122))
           { ++lcount;
           }
	  
           if((str.charCodeAt(i)>=48 && str.charCodeAt(i)<=57))
           { ++dcount;
           }
           if(!((str.charCodeAt(i)>=65 && str.charCodeAt(i)<=90)||(str.charCodeAt(i)>=97 && str.charCodeAt(i)<=122)||(str.charCodeAt(i)>=97 && str.charCodeAt(i)<=122))){
                 ++sccount;
            }
      }
     if(sccount>=1 && dcount>=1 && ucount>=1 && lcount>=1)
     {document.getElementById("s").innerHTML="";
     }
     else{
         document.getElementById("s").innerHTML="invalid password";
      }
    }
   }
</script>
  </head>
  <body>
     <input type='text' name='name' value='' style='width:400px;height:40px;'
onkeyup="validatePassword(this.value)"/><br/<br/>
<span id="s"> </span>
  </body>
</html>
